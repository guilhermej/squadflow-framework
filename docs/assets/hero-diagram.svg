<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <style>
      .layer-band { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .layer-band-strategy { fill: #fef3c7; stroke: #fde68a; }
      .layer-band-execution { fill: #dbeafe; stroke: #bfdbfe; }
      .layer-band-people { fill: #e0e7ff; stroke: #c7d2fe; }
      .layer-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #475569; letter-spacing: 0.06em; }
      .entity-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 600; fill: #0f172a; }
      .tagline { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; fill: #64748b; font-style: italic; }
      .edge { stroke: #94a3b8; stroke-width: 1.5; fill: none; stroke-dasharray: 3 4; }
    </style>
  </defs>

  <!-- Background bands -->
  <rect x="20" y="60" width="1160" height="110" rx="8" class="layer-band"/>
  <rect x="20" y="190" width="1160" height="110" rx="8" class="layer-band layer-band-strategy"/>
  <rect x="20" y="320" width="1160" height="110" rx="8" class="layer-band layer-band-execution"/>
  <rect x="20" y="450" width="1160" height="110" rx="8" class="layer-band layer-band-people"/>

  <!-- Layer labels -->
  <text x="40" y="82" class="layer-label">LAYER 0 · CONTEXT</text>
  <text x="40" y="212" class="layer-label">LAYER 1 · STRATEGY</text>
  <text x="40" y="342" class="layer-label">LAYER 2 · EXECUTION</text>
  <text x="40" y="472" class="layer-label">LAYER 3 · PEOPLE & KNOWLEDGE</text>

  <!-- Context: Company, Brand -->
  <g transform="translate(440 88)">
    <rect width="120" height="68" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <g transform="translate(12 14)" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="3" y="4" width="30" height="30" rx="1"/><rect x="9" y="11" width="4" height="4"/><rect x="23" y="11" width="4" height="4"/><rect x="9" y="21" width="4" height="4"/><rect x="23" y="21" width="4" height="4"/><path d="M14 34v-6h8v6"/><path d="M10 4 18 -3l8 7"/></g>
    <text x="64" y="44" class="entity-label">Company</text>
  </g>
  <g transform="translate(640 88)">
    <rect width="120" height="68" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <g transform="translate(16 14)" stroke="#0f172a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M6 2v36"/><path d="M6 4h24l-6 8 6 8H6"/></g>
    <text x="64" y="44" class="entity-label">Brand</text>
  </g>

  <!-- Strategy: OKR -->
  <g transform="translate(540 218)">
    <rect width="120" height="68" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <g transform="translate(10 14)" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="19" cy="19" r="15"/><circle cx="19" cy="19" r="9"/><circle cx="19" cy="19" r="3" fill="#b45309"/></g>
    <text x="64" y="44" class="entity-label">OKR</text>
  </g>

  <!-- Execution: Factory, Project, Squad, Task -->
  <g transform="translate(150 348)">
    <rect width="130" height="68" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(12 14)" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M4 34V16l10 5V14l10 6V14l10 7v13z"/><path d="M4 34h34"/><rect x="9" y="24" width="4" height="6"/><rect x="18" y="24" width="4" height="6"/><rect x="27" y="24" width="4" height="6"/></g>
    <text x="64" y="44" class="entity-label">Factory</text>
  </g>
  <g transform="translate(360 348)">
    <rect width="130" height="68" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(12 14)" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M26 6c-6 1-10 6-13 12l-4 3-3 5 6-1 3 5 3-4c6-3 10-7 12-13z"/><circle cx="26" cy="14" r="2" fill="#1d4ed8"/></g>
    <text x="64" y="44" class="entity-label">Project</text>
  </g>
  <g transform="translate(570 348)">
    <rect width="130" height="68" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(12 14)" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="20" cy="10" r="4"/><circle cx="8" cy="16" r="3.5"/><circle cx="32" cy="16" r="3.5"/><path d="M12 32c0-5 4-9 8-9s8 4 8 9"/></g>
    <text x="64" y="44" class="entity-label">Squad</text>
  </g>
  <g transform="translate(780 348)">
    <rect width="130" height="68" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(14 14)" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="4" y="4" width="32" height="32" rx="3"/><path d="M11 22l6 6 12-13"/></g>
    <text x="64" y="44" class="entity-label">Task</text>
  </g>

  <!-- People: Player, Document -->
  <g transform="translate(440 478)">
    <rect width="130" height="68" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <g transform="translate(14 14)" stroke="#6d28d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="20" cy="12" r="5"/><path d="M6 35c0-7 6-13 14-13s14 6 14 13"/></g>
    <text x="64" y="44" class="entity-label">Player</text>
  </g>
  <g transform="translate(650 478)">
    <rect width="130" height="68" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <g transform="translate(14 14)" stroke="#6d28d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M10 2h16l6 7v28H10z"/><path d="M26 2v7h6"/><path d="M14 18h14"/><path d="M14 24h14"/><path d="M14 30h10"/></g>
    <text x="64" y="44" class="entity-label">Document</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="40" text-anchor="middle" class="tagline">Factories run your business.  Projects change it.</text>

  <!-- Arrows connecting layers (subtle) -->
  <path d="M500 156c0 20 40 40 100 40s100 20 100 42" class="edge"/>
  <path d="M600 286c0 20-140 40-335 62" class="edge"/>
  <path d="M600 286c0 20-25 40-75 62" class="edge"/>
  <path d="M600 286c0 20 35 40 100 62" class="edge"/>
  <path d="M600 286c0 20 170 40 245 62" class="edge"/>
  <path d="M635 416c0 20-60 40-130 62" class="edge"/>
  <path d="M635 416c0 20 80 40 150 62" class="edge"/>
</svg>
